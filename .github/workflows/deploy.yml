# =========================================================
# GitHub Pages 部署工作流
# =========================================================
# @description 在 push 到 main 分支时，自动构建 React 前端并部署到 GitHub Pages。
#              使用 pnpm 安装 web 目录依赖，执行 vite build，将 web/dist 作为部署产物。
# @author 知识侦探团队
# @date 2026-07-08
# =========================================================

name: Deploy to GitHub Pages

on:
  # 在 push 到 main 分支时触发部署
  push:
    branches: [main]

  # 允许手动触发部署
  workflow_dispatch:

# 设置 GitHub Pages 部署权限
permissions:
  contents: read
  pages: write
  id-token: write

# 允许并发部署，但新的部署会取消旧的
concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  # =========================================================
  # 构建任务
  # =========================================================
  build:
    runs-on: ubuntu-latest
    steps:
      # 检出仓库代码
      - name: Checkout
        uses: actions/checkout@v4

      # 安装 pnpm
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      # 安装 Node.js
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: web/pnpm-lock.yaml

      # 安装 web 目录依赖
      - name: Install web dependencies
        run: cd web && pnpm install --frozen-lockfile

      # 构建 React 前端
      - name: Build web
        run: cd web && pnpm run build

      # 配置 GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v4

      # 上传构建产物
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  # =========================================================
  # 部署任务
  # =========================================================
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      # 部署到 GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
